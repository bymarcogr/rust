name:  FAST FILE FLOW CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: fast_file_flow

jobs:

  chef:
    name: Prepare dependency cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-chef
        run: cargo install cargo-chef

      - name: Prepare recipe
        run: cargo chef prepare --recipe-path recipe.json

      - uses: actions/upload-artifact@v4
        with:
          name: recipe
          path: fast_file_flow/recipe.json


  dependencies:
    name: Build dependencies
    runs-on: ubuntu-latest
    needs: chef

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-chef
        run: cargo install cargo-chef

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-x11-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - uses: actions/download-artifact@v4
        with:
          name: recipe
          path: fast_file_flow

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fast_file_flow/target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('fast_file_flow/recipe.json') }}

      - name: Build dependencies
        run: cargo chef cook --release --recipe-path recipe.json


  check:
    name: Check
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fast_file_flow/target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('fast_file_flow/recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - run: cargo check


  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check


  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fast_file_flow/target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('fast_file_flow/recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - run: cargo clippy -- -D warnings


  test:
    name: Test
    runs-on: ubuntu-latest
    needs: dependencies

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-x11-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fast_file_flow/target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('fast_file_flow/recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - run: cargo test --verbose


  build:
    name: Build
    runs-on: ${{ matrix.os }}
    needs: dependencies

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libxkbcommon-x11-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fast_file_flow/target
          key: ${{ runner.os }}-cargo-chef-${{ hashFiles('fast_file_flow/recipe.json') }}
          restore-keys: |
            ${{ runner.os }}-cargo-chef-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: fast_file_flow/target/release/*.exe

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: fast_file_flow/target/release/fast_file_flow

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: fast_file_flow/target/release/fast_file_flow